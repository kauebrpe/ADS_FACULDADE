<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário Avançado</title>
</head>
<body>
    <header>
        <h1>Cadastro de Usuário</h1>
    </header>

    <main>
        <section>
            <h2>Preencha seus dados</h2>

            <form action="#" method="POST">

                <!-- Nome -->
                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                <br><br>

                <!-- Email -->
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" placeholder="Digite seu email" required>
                <br><br>

                <!-- Senha -->
                <label for="senha">Senha:</label><br>
                <input type="password" id="senha" name="senha" required>
                <br><br>

                <!-- Confirmação de Senha -->
                <label for="confirmarSenha">Confirmar Senha:</label><br>
                <input type="password" id="confirmarSenha" name="confirmarSenha" required>
                <br><br>

                <!-- Gênero (Radio) -->
                <label>Gênero:</label><br>
                <input type="radio" id="masculino" name="genero" value="masculino">
                <label for="masculino">Masculino</label><br>

                <input type="radio" id="feminino" name="genero" value="feminino">
                <label for="feminino">Feminino</label><br>

                <input type="radio" id="outro" name="genero" value="outro">
                <label for="outro">Outro</label>
                <br><br>

                <!-- Interesses-->
                <label>Interesses:</label><br>
                <input type="checkbox" id="tecnologia" name="interesses" value="tecnologia">
                <label for="tecnologia">Tecnologia</label><br>
                <input type="checkbox" id="esportes" name="interesses" value="esportes">
                <label for="esportes">Esportes</label><br>
                <input type="checkbox" id="musica" name="interesses" value="musica">
                <label for="musica">Música</label>
                <br><br>

                <!-- Cidade-->
                <label for="cidade">Cidade:</label><br>
                <select id="cidade" name="cidade">
                    <option value="">Selecione</option>
                    <option value="recife">Recife</option>
                    <option value="olinda">Olinda</option>
                    <option value="jaboatao">Jaboatão</option>
                </select>
                <br><br>
                <!-- Mensagem -->

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="4" cols="30"></textarea>
                <br><br>

                <!-- Botão -->
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
</body>
</html>
