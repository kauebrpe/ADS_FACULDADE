<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tabela e Multimídia</title>
</head>
<body>

    <!-- TÍTULO DA PÁGINA -->
    <h1>Horários de Aula</h1>

    <!-- PARTE 01 - TABELA -->
    <!-- Tabela para organizar os horários (linhas e colunas) -->
    <table border="1">

        <!-- CABEÇALHO DA TABELA -->
        <thead>
            <tr>
                <!-- TH = título da coluna -->
                <th>Horário</th>
                <th>Seg</th>
                <th>Ter</th>
                <th>Qua</th>
                <th>Qui</th>
                <th>Sex</th>
                <th>Sáb</th>
            </tr>
        </thead>

        <!-- CORPO DA TABELA -->
        <tbody>
            <tr>
                <td>13:00 - 14:00</td>
                <td>Coding</td>
                <td>Banco de Dados</td>
                <td>Design</td>
                <td>Gestão</td>
                <td>Inglês</td>
                <td></td>
            </tr>

            <tr>
                <td>14:00 - 15:00</td>
                <td></td>
                <td></td>
                <td>Front-End</td>
                <td>Inovação</td>
                <td></td>
                <td></td>
            </tr>

            <tr>
                <td>15:10 - 16:10</td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td>Ética (EAD)</td>
            </tr>
        </tbody>

    </table>

    <!-- PARTE 02 - IMAGEM -->
    <h2>Imagem de Perfil</h2>

    <!-- IMG = inserir imagem -->
    <!-- src = caminho da imagem (VOCÊ VAI COLOCAR) -->
    <!-- alt = descrição da imagem -->
    <!-- width = tamanho da imagem -->
    <img src="SUA_IMAGEM_AQUI.jpg" alt="Minha foto" width="300">


    <!-- PARTE 03 - VÍDEO -->
    <h2>Vídeo</h2>

    <!-- OPÇÃO 1 - VÍDEO LOCAL -->
    <!-- controls = mostra os botões (play, pause, etc) -->
    <video controls width="300">
        <!-- MEU VÍDEO -->
        <source src="nomedovideo.mp4">
    </video>

    <br><br>

    <!-- OPÇÃO 2 - VÍDEO DO YOUTUBE -->
    <!-- iframe = incorporar vídeo do youtube -->
    <iframe width="300" src="https://www.youtube.com/embed/VIDEO_ID"></iframe>

</body>
</html>
